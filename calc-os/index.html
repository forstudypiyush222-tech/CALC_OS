<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALC_OS</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Scripts -->
    <script defer src="js/app.js"></script>
    <script defer src="js/calculator.js"></script>
    <script defer src="js/history.js"></script>
</head>
<body>
    <!-- Background Overlays -->
    <div class="noise-overlay"></div>
    <div class="vignette-overlay"></div>
    <div class="radial-overlay"></div>

    <!-- Main Application Container -->
    <div id="calculator-container" class="calculator">
        
        <!-- Header -->
        <header>
            <button id="history-toggle" class="history-toggle" aria-label="Open history">
                <span class="material-symbols-outlined">history</span>
            </button>
            <h1 class="header-title">CALC_OS</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <span id="theme-icon" class="material-symbols-outlined">dark_mode</span>
            </button>
        </header>

        <!-- Calculator Main Area -->
        <!-- Display Panel -->
            <section class="display" aria-label="Calculator display">
                <div class="display-glow"></div>
                <div class="expression-container">
                    <span id="display-expression" class="expression font-headline-sm"></span>
                </div>
                <div class="result-container">
                    <span id="display-result" class="result font-display-result">0</span>
                </div>
            </section>

            <!-- Keypad -->
            <section class="keypad" aria-label="Calculator keypad">
                <button class="key operator-key font-headline-sm" data-key="AC">AC</button>
                <button class="key operator-key font-headline-sm" data-key="backspace">
                    <span class="material-symbols-outlined">backspace</span>
                </button>
                <button class="key operator-key font-headline-sm" data-key="%">%</button>
                <button class="key operator-key font-display-md" data-key="÷">÷</button>

                <button class="key number-key font-headline-sm" data-key="7">7</button>
                <button class="key number-key font-headline-sm" data-key="8">8</button>
                <button class="key number-key font-headline-sm" data-key="9">9</button>
                <button class="key operator-key font-display-md" data-key="×">×</button>

                <button class="key number-key font-headline-sm" data-key="4">4</button>
                <button class="key number-key font-headline-sm" data-key="5">5</button>
                <button class="key number-key font-headline-sm" data-key="6">6</button>
                <button class="key operator-key font-display-md" data-key="−">−</button>

                <button class="key number-key font-headline-sm" data-key="1">1</button>
                <button class="key number-key font-headline-sm" data-key="2">2</button>
                <button class="key number-key font-headline-sm" data-key="3">3</button>
                <button class="key operator-key font-display-md" data-key="+">+</button>

                <button class="key number-key font-headline-sm" data-key="0">0</button>
                <button class="key number-key font-headline-sm" data-key=".">.</button>
                <button class="key equal-key font-display-md" data-key="=">=</button>
            </section>
    </div>

    <!-- History Backdrop -->
    <div id="backdrop" class="backdrop"></div>

    <!-- History Bottom Sheet -->
    <section id="history-sheet" class="history-sheet" aria-hidden="true">
        <div class="history-panel">
            <div id="drag-handle-container" class="drag-handle-container">
                <div class="drag-handle"></div>
            </div>
            
            <header class="history-header">
                <div class="history-header-left">
                    <button id="history-close-btn" class="history-close-btn" aria-label="Close history">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                    <h2 class="font-headline-sm">History</h2>
                </div>
                <button id="history-clear-btn" class="history-clear-btn" aria-label="Clear history">
                    <span class="material-symbols-outlined history-clear-icon">delete</span>
                    Clear
                </button>
            </header>

            <div id="history-list" class="history-list">
                <!-- Empty History State -->
                <div class="empty-history">
                    <h3 class="font-headline-sm">No History Yet</h3>
                    <p class="font-label-md">Your completed calculations will appear here.</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
